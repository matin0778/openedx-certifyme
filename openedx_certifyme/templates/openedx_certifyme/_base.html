<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}CertifyMe{% endblock %}</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.5rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid rgba(128, 128, 128, 0.3); }
  .status { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px; font-size: 0.85rem; }
  .status-issued { background: rgba(22, 163, 74, 0.2); color: #16a34a; }
  .status-pending { background: rgba(202, 138, 4, 0.2); color: #ca8a04; }
  .status-failed { background: rgba(220, 38, 38, 0.2); color: #dc2626; }
  .status-revoked { background: rgba(107, 114, 128, 0.2); color: #6b7280; }
  a.button {
    display: inline-block;
    padding: 0.3rem 0.75rem;
    border: 1px solid currentColor;
    border-radius: 0.35rem;
    text-decoration: none;
    margin: 0 0.4rem 0.4rem 0;
    color: inherit;
  }
  .empty { opacity: 0.75; margin-top: 1rem; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
